name: build-plugin

# Vessel CI pipeline.
# v0.1 (alpha): docs / branding / API-key / clang-format checks on every push + PR.
# A real UE build matrix is scaffolded below but commented out — it requires
# self-hosted runners with UE installed and is a v0.2 deliverable.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]      # also run on release tags so the GitHub Release page shows a green check
  pull_request:
    branches: [ main ]

jobs:
  docs-lint:
    name: Docs & format checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify docs tree structure
        run: |
          set -e
          test -f README.md
          test -f AGENTS.md
          test -f LICENSE
          test -d docs/product
          test -d docs/engineering
          test -d docs/process
          echo "OK: docs tree present"

      - name: No forbidden phrases in public files
        env:
          # Read patterns from env so the raw strings don't appear literally
          # in the workflow file (which would self-trigger the check).
          FORBIDDEN_RE: ${{ vars.FORBIDDEN_BRAND_REGEX }}
        run: |
          set -e
          # Fallback regex built piece-by-piece so no full brand name appears inline.
          : "${FORBIDDEN_RE:=$(printf '%s' 'Var' 'sapura')"\|"$(printf '%s' 'mi' 'Ho' 'Yo')"\|"$(printf '%s' 'HoYo' 'verse')"\|"$(printf '%s' 'Shadow Pat' 'rol')}"
          if grep -riE "$FORBIDDEN_RE" \
               --include="*.md" --include="*.h" --include="*.cpp" \
               --include="*.cs" --include="*.ini" \
               --exclude-dir=".git" --exclude-dir=".github" .; then
            echo "::error::Forbidden branding found in public files"
            exit 1
          fi
          echo "OK: no forbidden phrases"

      - name: No API keys in tracked files
        run: |
          set -e
          # Skip the workflow itself (contains the pattern as a regex).
          if grep -rE 'sk-ant-[A-Za-z0-9_-]{20,}|sk-proj-[A-Za-z0-9_-]{20,}' \
               --exclude-dir=.git --exclude-dir=.github .; then
            echo "::error::Potential API key in tracked files"
            exit 1
          fi
          echo "OK: no obvious API keys"

  clang-format:
    # Advisory during v0.1 alpha: maintainer does not yet have clang-format
    # locally, so we report drift but do not block main. v0.2 will (a) install
    # clang-format on the author's box, (b) sweep the existing drift, then
    # (c) drop `continue-on-error` from the step to make format blocking.
    # See CODING_STYLE.md §8 for the ultimate rule (CI enforces format).
    #
    # Note: continue-on-error sits on the *step*, not the job. Job-level
    # continue-on-error still leaves the job marked as `failure` in the
    # GitHub UI; step-level lets the job conclusion stay `success` while
    # surfacing drift in logs.
    name: C++ format check (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if any C++ sources exist
        id: has_cpp
        run: |
          if find . -name "*.cpp" -o -name "*.h" 2>/dev/null | head -1 | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run clang-format (advisory)
        if: steps.has_cpp.outputs.present == 'true'
        continue-on-error: true
        uses: jidicula/clang-format-action@v4.11.0
        with:
          clang-format-version: '17'
          check-path: '.'

